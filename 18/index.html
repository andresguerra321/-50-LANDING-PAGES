<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Fashion Outfits</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <header class="header">
        
        <div class="header-left">
            
            <svg class="waves" width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 10 Q 15 -5, 30 10 T 60 10 T 90 10 T 120 10 T 150 10 T 180 10" stroke="#444" stroke-width="1.5"/>
                <path d="M0 30 Q 15 15, 30 30 T 60 30 T 90 30 T 120 30 T 150 30 T 180 30" stroke="#444" stroke-width="1.5"/>
            </svg>
            
            <svg class="circle-text" width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
                
                <path id="curve-left" d="M 70, 70 m -45, 0 a 45,45 0 1,1 90,0 a 45,45 0 1,1 -90,0" fill="transparent" />
                <text font-family="'Playfair Display', serif" font-size="12" fill="#333" letter-spacing="2">
                    <textPath href="#curve-left" textLength="280">Lorem ipsum dolor sit amet, cons </textPath>
                </text>
            </svg>
        </div>
        
        <div class="header-center">
            <h1>Your ultimate<br>fashion outfits</h1>
            <p>Lorem ipsum dolor sit amet, consectetur<br>adipiscing elit. Faucibus in libero risus</p>
            <a href="#" class="btn-explore">Explore</a>
        </div>
        
        <div class="header-right">
            
            <svg class="circle-text" width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">
                <path id="curve-right" d="M 70, 70 m -45, 0 a 45,45 0 1,1 90,0 a 45,45 0 1,1 -90,0" fill="transparent" />
                <text font-family="'Playfair Display', serif" font-size="12" fill="#333" letter-spacing="2">
                    <textPath href="#curve-right" textLength="280">Lorem ipsum dolor sit amet, cons </textPath>
                </text>
            </svg>
            
            <svg class="waves" width="180" height="40" viewBox="0 0 180 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M0 10 Q 15 -5, 30 10 T 60 10 T 90 10 T 120 10 T 150 10 T 180 10" stroke="#444" stroke-width="1.5"/>
                <path d="M0 30 Q 15 15, 30 30 T 60 30 T 90 30 T 120 30 T 150 30 T 180 30" stroke="#444" stroke-width="1.5"/>
            </svg>
        </div>
    </header>
    <section class="gallery">
        
        
        <div class="col col-1">
            <div class="text-block text-left">
                <p>Exclusive gifts.</p>
                <p>Insider access.</p>
                <p>Special events.</p>
                <div class="underline"></div>
            </div>
            
            <img src="media/left.png" class="gallery-img img-1" alt="Fashion 1">
        </div>
        
        <div class="col col-2">
            <img src="media/amarillo.png" class="gallery-img img-2" alt="Fashion 2">
            <img src="media/chico cafe.png" class="gallery-img img-3" alt="Fashion 3">
        </div>
        
        <div class="col col-3">
            <img src="media/Middle.png" class="gallery-img img-4" alt="Fashion 4">
        </div>
        
        <div class="col col-4">
            <img src="media/dospelaos.png" class="gallery-img img-5" alt="Fashion 5">
            <img src="media/amarrillo sinverguenza.png" class="gallery-img img-6" alt="Fashion 6">
        </div>
        
        <div class="col col-5">
            <img src="media/right.png" class="gallery-img img-7" alt="Fashion 7">
            <div class="text-block text-right">
                <p>Beauty</p>
                <p>Fashion</p>
                <p>Culture</p>
                <div class="underline"></div>
            </div>
        </div>
    </section>
</body>
</html>
