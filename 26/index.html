<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juicy Bite Burger</title>
    <!-- Importing Montserrat for a bold, appetizing premium look -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="CSS/style.css">
</head>

<body>
    <div class="wrapper">
        <main class="container">

            <div class="main-content">
                <!-- LEfT SECTION (Text) -->
                <div class="col-left">
                    <h1 class="hero-title">
                        Wake up your<br>
                        taste buds with<br>
                        this <span class="text-red">juicy bite</span>
                    </h1>

                    <!-- overlapping circular thumbnails -->
                    <div class="thumbnails">
                        <!-- REPLACE the src attribute with links to your own mini burger images -->
                        <img src="media/1.png" alt="Burger variant 1"
                            class="thumb">
                        <img src="media/2.png" alt="Burger variant 2"
                            class="thumb">
                        <img src="media/3.png" alt="Burger variant 3"
                            class="thumb">
                        <img src="media/4.png" alt="Burger variant 4"
                            class="thumb">
                        <img src="media/5.png" alt="Burger variant 5"
                            class="thumb">
                        <img src="media/6.png" alt="Burger variant 6"
                            class="thumb">
                        <img src="media/7.png" alt="Burger variant 7"
                            class="thumb">
                    </div>

                    <p class="hero-desc">
                        Lorem ipsum dolor sit amet, consectetur<br>
                        adipiscing elit. Faucibus in libero risus.
                    </p>

                    <a href="#" class="btn-primary">Explore the menu</a>
                </div>

                <!-- RIGHT SECTION (Big Image) -->
                <div class="col-right">
                 
                    <div class="glow"></div>
                   
                    <img src="media/unsplash_T8SD7bwyxHU.png"
                        alt="Deconstructed flying burger" class="burger-img">
                </div>
            </div>

            <!-- BOTTOM FEATURES PILLS -->
            <div class="features-row">
                <div class="feature-pill">
                    <span>From farm to table</span>
                </div>
                <div class="feature-pill">
                    <span>100% grass-feed beef</span>
                </div>
                <!-- Note the text in the image is "grass-feed", but usually it's "grass-fed". I kept the text exactly as the image -->
                <div class="feature-pill">
                    <span>100% organic & natural</span>
                </div>
            </div>

        </main>
    </div>
</body>

</html>
