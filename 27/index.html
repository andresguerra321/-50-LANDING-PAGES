<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yoga Club</title>
  <link rel="stylesheet" href="CSS/style.css" />
 <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

<body>

  <section class="hero">

    <!-- Imagen de fondo principal -->
    <img src="media/unsplash_xB4ExGcUai0.png" alt="yoga background" class="hero__bg" />

    <!-- Tarjeta glassmorphism izquierda -->
    <div class="hero__card">
      <p class="hero__tag">✦ Yoga club</p>
      <h1 class="hero__title">Improve your<br />mind-muscle</h1>
      <p class="hero__desc">
        Lorem ipsum dolor sit amet, consectetur
        adipiscing elit. Cursus imperdiet sed id
        elementum. Quam vel aliquam sit
        vulputate. Faucibus nec gravida ipsum
        pulvinar vel non.
      </p>
      <a href="#" class="hero__btn">Register a class</a>
    </div>

    <!-- Columna de 3 fotos derecha -->
    <div class="hero__gallery">
      <div class="gallery-img">
        <img src="media/1.png" alt="yoga pose 1" />
      </div>
      <div class="gallery-img">
        <img src="media/2.png" alt="yoga pose 2" />
      </div>
      <div class="gallery-img">
        <img src="media/3.png" alt="yoga pose 3" />
