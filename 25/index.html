<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boba Vibe</title>
  <link rel="stylesheet" href="CSS/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap" rel="stylesheet" />
</head>
<body>
  
  <section class="hero">
    
    <div class="hero__left">
      
      <div class="boba-icon">
        <svg viewBox="0 0 80 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          
          <path d="M20 30 L15 85 Q15 92 25 92 L55 92 Q65 92 65 85 L60 30 Z" stroke="#3b2005" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
          
          <path d="M16 30 Q40 24 64 30" stroke="#3b2005" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          
          <line x1="46" y1="6" x2="38" y2="34" stroke="#3b2005" stroke-width="2.5" stroke-linecap="round"/>
          
          <circle cx="30" cy="68" r="4" fill="#3b2005" opacity="0.7"/>
          <circle cx="42" cy="75" r="4.5" fill="#3b2005" opacity="0.7"/>
          <circle cx="53" cy="67" r="3.5" fill="#3b2005" opacity="0.7"/>
          <circle cx="35" cy="80" r="3" fill="#3b2005" opacity="0.5"/>
          <circle cx="50" cy="79" r="3" fill="#3b2005" opacity="0.5"/>
        </svg>
      </div>
      <h1 class="hero__title">Boba vibe</h1>
      <p class="hero__desc">
        Lorem ipsum dolor sit amet, consectetur<br />
        adipiscing elit. Faucibus in libero risus semper
      </p>
      <a href="#" class="hero__btn">Browse menu</a>
    </div>
    
    <div class="hero__right">
      <div class="blob"></div>
      
      <img src="media/grandote.png" alt="boba drink" class="hero__drink" />
    </div>
  </section>
  
  <section class="stats">
    <div class="stat-card">
      
      <img src="media/izquierda.png" alt="drinks" class="stat-card__img" />
      <div class="stat-card__info">
        <h2 class="stat-card__num">56</h2>
        <p class="stat-card__desc">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      </div>
    </div>
    <div class="stat-card">
      <img src="media/centro.png" alt="drinks" class="stat-card__img" />
      <div class="stat-card__info">
        <h2 class="stat-card__num">88</h2>
        <p class="stat-card__desc">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      </div>
    </div>
    <div class="stat-card">
      <img src="media/derecha.png" alt="drinks" class="stat-card__img" />
      <div class="stat-card__info">
        <h2 class="stat-card__num">23</h2>
        <p class="stat-card__desc">Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
      </div>
    </div>
  </section>
</body>
</html>
